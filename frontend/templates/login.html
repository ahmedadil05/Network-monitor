{% extends "base.html" %}
{% block title %}Login - Network Monitor{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">N</div>
            <h1>Network Monitor</h1>
            <p>Sign in to your account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-control"
                    placeholder="Enter your username"
                    autocomplete="username"
                    required
                >
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                >
            </div>
            <div class="form-group">
                <label for="login_as">Login As</label>
                <select id="login_as" name="login_as" class="form-control" required>
                    <option value="user" selected>User (Viewer/Analyst)</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Sign In
            </button>
        </form>

        <div class="login-footer">
            <p>Accounts are created by administrators only.</p>
        </div>
    </div>
</div>
{% endblock %}
